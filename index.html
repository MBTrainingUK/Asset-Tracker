<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Asset Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #f4f6fb;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 0 40px;
    }

    /* ── Header ── */
    header {
      width: 100%;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 60%, #0f3460 100%);
      padding: 20px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 32px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.18);
    }

    .header-brand {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .header-icon {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, #4361ee, #7b2ff7);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      box-shadow: 0 2px 8px rgba(67,97,238,0.4);
    }

    header h1 {
      font-size: 1.15rem;
      font-weight: 700;
      color: white;
      letter-spacing: -0.01em;
    }

    header a {
      font-size: 0.82rem;
      color: rgba(255,255,255,0.6);
      text-decoration: none;
      font-weight: 500;
      transition: color 0.2s;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    header a:hover { color: white; }

    /* ── Card ── */
    .card {
      background: white;
      border-radius: 20px;
      padding: 28px 24px;
      width: calc(100% - 32px);
      max-width: 480px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.07), 0 1px 4px rgba(0,0,0,0.04);
      border: 1px solid rgba(0,0,0,0.05);
    }

    .card h2 {
      font-size: 1rem;
      font-weight: 700;
      color: #0f172a;
      margin-bottom: 20px;
      letter-spacing: -0.01em;
    }

    /* ── Form elements ── */
    label {
      display: block;
      font-size: 0.75rem;
      font-weight: 600;
      color: #64748b;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    input, textarea, select {
      width: 100%;
      padding: 11px 14px;
      border: 1.5px solid #e2e8f0;
      border-radius: 10px;
      font-size: 0.95rem;
      font-family: 'Inter', sans-serif;
      color: #0f172a;
      background: #f8fafc;
      transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
      margin-bottom: 16px;
    }

    input:focus, textarea:focus, select:focus {
      outline: none;
      border-color: #4361ee;
      background: white;
      box-shadow: 0 0 0 3px rgba(67,97,238,0.1);
    }

    textarea { resize: vertical; min-height: 88px; }

    /* ── Buttons ── */
    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 10px;
      font-size: 0.95rem;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: -0.01em;
    }

    button:active { transform: scale(0.98); }

    .btn-primary {
      background: linear-gradient(135deg, #4361ee, #3a56d4);
      color: white;
      box-shadow: 0 2px 12px rgba(67,97,238,0.35);
    }
    .btn-primary:hover {
      box-shadow: 0 4px 18px rgba(67,97,238,0.45);
      transform: translateY(-1px);
    }

    .btn-secondary {
      background: #f1f5f9;
      color: #475569;
      margin-top: 10px;
      border: 1px solid #e2e8f0;
    }
    .btn-secondary:hover { background: #e2e8f0; }

    .btn-danger {
      background: #fff0f0;
      color: #e63946;
      margin-top: 10px;
      border: 1px solid #fecaca;
    }

    /* ── Badges ── */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 600;
      margin-bottom: 12px;
      letter-spacing: 0.02em;
    }
    .badge-new { background: #fef9c3; color: #854d0e; border: 1px solid #fde68a; }
    .badge-found { background: #dcfce7; color: #166534; border: 1px solid #bbf7d0; }

    /* ── Asset ID display ── */
    .asset-id {
      font-size: 2.2rem;
      font-weight: 800;
      background: linear-gradient(135deg, #4361ee, #7b2ff7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: 0.04em;
      margin-bottom: 4px;
      line-height: 1.1;
    }

    /* ── Detail rows ── */
    .detail-row {
      display: flex;
      flex-direction: column;
      margin-bottom: 14px;
    }

    .detail-label {
      font-size: 0.72rem;
      font-weight: 600;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      margin-bottom: 3px;
    }

    .detail-value {
      font-size: 0.97rem;
      color: #0f172a;
      font-weight: 500;
    }

    .divider {
      border: none;
      border-top: 1px solid #f1f5f9;
      margin: 20px 0;
    }

    #status-msg {
      margin-top: 14px;
      font-size: 0.88rem;
      text-align: center;
      min-height: 22px;
    }

    .msg-success { color: #16a34a; }
    .msg-error { color: #dc2626; }

    #lookup-section, #asset-section { display: block; }
    #asset-section { display: none; }

    /* ── Spinner ── */
    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2.5px solid #e2e8f0;
      border-top-color: #4361ee;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .updated-text {
      font-size: 0.75rem;
      color: #94a3b8;
      margin-top: 6px;
    }

    /* ── QR Scan button ── */
    .btn-scan {
      width: 100%;
      padding: 13px;
      border: 2px dashed #c7d2fe;
      border-radius: 12px;
      font-size: 0.95rem;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      background: #eef2ff;
      color: #4361ee;
      margin-bottom: 16px;
      transition: all 0.2s;
      letter-spacing: -0.01em;
    }
    .btn-scan:hover { background: #e0e7ff; border-color: #4361ee; }

    /* ── QR Reader ── */
    #qr-reader-wrapper {
      display: none;
      margin-bottom: 16px;
      border-radius: 12px;
      overflow: hidden;
      border: 1.5px solid #e2e8f0;
      background: #000;
      position: relative;
    }
    #qr-reader { width: 100%; }
    #qr-reader video { width: 100% !important; border-radius: 0 !important; }
    #qr-reader img { display: none !important; }

    #btn-stop-scan {
      display: block;
      width: 100%;
      padding: 10px;
      background: #fff1f2;
      border: none;
      border-top: 1px solid #fecaca;
      color: #dc2626;
      font-size: 0.88rem;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
    }

    #new-location-wrapper input {
      border-color: #4361ee;
      background: #eef2ff;
    }

    /* ── Booking buttons ── */
    .btn-warning {
      background: #fffbeb;
      color: #92400e;
      margin-top: 10px;
      border: 1px solid #fde68a;
    }
    .btn-warning:hover { background: #fef3c7; }

    .btn-return {
      background: #f0fdf4;
      color: #166534;
      margin-top: 10px;
      border: 1px solid #bbf7d0;
    }
    .btn-return:hover { background: #dcfce7; }

    /* ── Booking info card ── */
    .booking-info {
      background: linear-gradient(135deg, #fffbeb, #fef9c3);
      border: 1px solid #fde68a;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
    }
    .booking-info .detail-row { margin-bottom: 8px; }
    .booking-info .detail-row:last-child { margin-bottom: 0; }
    .booking-info .detail-label { color: #92400e; }

    /* ── Status pills ── */
    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 14px;
      border-radius: 20px;
      font-size: 0.78rem;
      font-weight: 600;
      margin-bottom: 12px;
      letter-spacing: 0.02em;
    }
    .status-onsite { background: #dcfce7; color: #166534; border: 1px solid #bbf7d0; }
    .status-offsite { background: #fef9c3; color: #854d0e; border: 1px solid #fde68a; }

    /* ── Condition pills ── */
    .condition-good { background: #dcfce7; color: #166534; border: 1px solid #bbf7d0; }
    .condition-attention { background: #fff7ed; color: #9a3412; border: 1px solid #fed7aa; }
    .condition-damaged { background: #fee2e2; color: #991b1b; border: 1px solid #fca5a5; }

    /* ── Divider with label ── */
    .section-sep {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 20px 0 16px;
    }
    .section-sep span {
      font-size: 0.72rem;
      font-weight: 700;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      white-space: nowrap;
    }
    .section-sep::before, .section-sep::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #f1f5f9;
    }
  </style>
</head>
<body>

  <header>
    <div class="header-brand">
      <div class="header-icon">📦</div>
      <h1>Asset Tracker</h1>
    </div>
    <a href="admin.html">Admin →</a>
  </header>

  <div class="card" id="lookup-section">
    <h2>Look up an asset</h2>
    <button class="btn-scan" onclick="startScan()">📷 Scan QR Code</button>
    <div id="qr-reader-wrapper">
      <div id="qr-reader"></div>
      <button id="btn-stop-scan" onclick="stopScan()">✕ Cancel Scan</button>
    </div>
    <label for="asset-id-input">Or enter manually</label>
    <input
      type="text"
      id="asset-id-input"
      placeholder="e.g. 000001"
      maxlength="20"
      autocomplete="off"
      inputmode="numeric"
    />
    <button class="btn-primary" onclick="lookupAsset()">Search</button>
    <div id="lookup-status" style="margin-top:12px; font-size:0.9rem; text-align:center; color:#e63946;"></div>
  </div>

  <div class="card" id="asset-section">

    <div id="asset-display">
      <!-- View mode -->
      <div id="view-mode">
        <span class="badge" id="asset-badge"></span>
        <div class="asset-id" id="display-id"></div>
        <hr class="divider" />

        <div id="view-details"></div>
        <div id="booking-details-display"></div>

        <div id="bookout-form" style="display:none;">
          <hr class="divider" />
          <label for="input-bookedby">Taken by</label>
          <input type="text" id="input-bookedby" placeholder="Person's full name…" autocomplete="off" />
          <label for="input-destination">Destination / Purpose</label>
          <input type="text" id="input-destination" placeholder="e.g. Client site, Home, Workshop" autocomplete="off" />
          <label for="input-booknotes">Notes (optional)</label>
          <textarea id="input-booknotes" placeholder="Any extra details…"></textarea>
          <button class="btn-primary" onclick="confirmBookOut()">📤 Confirm Book Out</button>
          <button class="btn-secondary" onclick="cancelBookingForm()">Cancel</button>
        </div>

        <div id="booking-msg" style="margin-top:10px; font-size:0.9rem; text-align:center; min-height:20px;"></div>

        <button class="btn-primary" onclick="enableEdit()">✏️ Edit Asset</button>
        <button id="btn-bookout" class="btn-warning" onclick="showBookingForm()" style="display:none;">📤 Book Out (Off-Site)</button>
        <button id="btn-return" class="btn-return" onclick="returnAsset()" style="display:none;">📥 Return Asset</button>
        <button class="btn-secondary" onclick="resetToLookup()">← Search Another</button>
      </div>

      <!-- Edit / Register mode -->
      <div id="edit-mode" style="display:none;">
        <span class="badge" id="edit-badge"></span>
        <div class="asset-id" id="edit-display-id"></div>
        <hr class="divider" />

        <label for="input-location">Location</label>
        <select id="input-location" onchange="handleLocationChange(this)">
          <option value="" disabled selected>Select a location…</option>
        </select>
        <div id="new-location-wrapper" style="display:none; margin-top:-8px;">
          <input type="text" id="input-new-location" placeholder="Type new location name…" />
        </div>

        <label for="input-description">Description</label>
        <textarea id="input-description" placeholder="e.g. Dell 24in Monitor, black"></textarea>

        <label for="input-partno">Part No. <span style="font-weight:400;text-transform:none;letter-spacing:0;color:#94a3b8;">(optional)</span></label>
        <input type="text" id="input-partno" placeholder="e.g. MNE02B/A" autocomplete="off" />

        <label for="input-condition">Condition</label>
        <select id="input-condition">
          <option value="good">✅ Good</option>
          <option value="attention">⚠️ Needs Attention</option>
          <option value="damaged">🔴 Damaged</option>
        </select>

        <button class="btn-primary" onclick="saveAsset()">💾 Save Asset</button>
        <button class="btn-secondary" onclick="cancelEdit()">Cancel</button>
        <div id="status-msg"></div>
      </div>
    </div>

  </div>

  <!-- Firebase SDK -->
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, doc, getDoc, setDoc, addDoc, updateDoc, serverTimestamp, collection, getDocs }
      from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyARn4prWj_fcSOwNMp_tp15M3BNZR5CmB8",
      authDomain: "asset-tracker-fd8de.firebaseapp.com",
      projectId: "asset-tracker-fd8de",
      storageBucket: "asset-tracker-fd8de.firebasestorage.app",
      messagingSenderId: "825828878834",
      appId: "1:825828878834:web:498d9e24f73b60a0de236b"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let knownLocations = [];
    let locationsLoaded = false;

    async function loadLocations() {
      if (locationsLoaded) return;
      try {
        const snap = await getDocs(collection(db, 'assets'));
        const locs = new Set();
        snap.docs.forEach(d => { if (d.data().location) locs.add(d.data().location); });
        knownLocations = [...locs].sort();
        locationsLoaded = true;
      } catch (e) { knownLocations = []; }
    }

    function populateLocationDropdown(selectedValue = '') {
      const sel = document.getElementById('input-location');
      sel.innerHTML = '<option value="" disabled>Select a location…</option>';
      knownLocations.forEach(loc => {
        const opt = document.createElement('option');
        opt.value = loc;
        opt.textContent = loc;
        if (loc === selectedValue) opt.selected = true;
        sel.appendChild(opt);
      });
      const addOpt = document.createElement('option');
      addOpt.value = '__new__';
      addOpt.textContent = '＋ Add new location…';
      sel.appendChild(addOpt);
      if (!selectedValue) sel.value = '';
      document.getElementById('new-location-wrapper').style.display = 'none';
      document.getElementById('input-new-location').value = '';
    }

    window.handleLocationChange = function (sel) {
      const wrapper = document.getElementById('new-location-wrapper');
      if (sel.value === '__new__') {
        wrapper.style.display = 'block';
        document.getElementById('input-new-location').focus();
      } else {
        wrapper.style.display = 'none';
      }
    };

    function getLocationValue() {
      const sel = document.getElementById('input-location');
      if (sel.value === '__new__') {
        return document.getElementById('input-new-location').value.trim();
      }
      return sel.value;
    }

    let currentId = null;
    let isNewAsset = false;
    let qrScanner = null;
    let currentBookingId = null;
    let currentAssetData = null;

    window.startScan = function () {
      const wrapper = document.getElementById('qr-reader-wrapper');
      wrapper.style.display = 'block';
      document.getElementById('lookup-status').textContent = '';

      qrScanner = new Html5Qrcode('qr-reader');
      qrScanner.start(
        { facingMode: 'environment' },
        { fps: 10, qrbox: { width: 220, height: 220 } },
        (decodedText) => {
          const match = decodedText.match(/(\d+)$/);
          const id = match ? match[1] : decodedText.trim();
          stopScan();
          document.getElementById('asset-id-input').value = id;
          window.lookupAsset();
        },
        () => {}
      ).then(() => {
        // Wait for video to be fully ready before applying autofocus
        setTimeout(() => {
          const video = document.querySelector('#qr-reader video');
          if (video && video.srcObject) {
            const track = video.srcObject.getVideoTracks()[0];
            if (track) {
              track.applyConstraints({ advanced: [{ focusMode: 'continuous' }] }).catch(() => {});
            }
          }
        }, 1500);
      }).catch(err => {
        document.getElementById('lookup-status').textContent = 'Camera access denied. Please allow camera permissions in your browser settings.';
        wrapper.style.display = 'none';
        console.error(err);
      });
    };

    window.stopScan = function () {
      if (qrScanner) {
        qrScanner.stop().then(() => {
          qrScanner.clear();
          qrScanner = null;
        }).catch(() => {});
      }
      document.getElementById('qr-reader-wrapper').style.display = 'none';
    };



    window.lookupAsset = async function () {
      const raw = document.getElementById('asset-id-input').value.trim();
      const statusEl = document.getElementById('lookup-status');

      if (!raw) {
        statusEl.textContent = 'Please enter an asset number.';
        return;
      }

      statusEl.innerHTML = '<span class="spinner"></span> Looking up…';

      try {
        const assetRef = doc(db, 'assets', raw);
        const snap = await getDoc(assetRef);

        currentId = raw;
        document.getElementById('lookup-section').style.display = 'none';
        document.getElementById('asset-section').style.display = 'block';
        document.getElementById('display-id').textContent = raw;
        document.getElementById('edit-display-id').textContent = raw;
        statusEl.textContent = '';

        if (snap.exists()) {
          const data = snap.data();
          currentAssetData = data;
          isNewAsset = false;

          document.getElementById('asset-badge').textContent = '✅ Registered';
          document.getElementById('asset-badge').className = 'badge badge-found';

          const updatedAt = data.updatedAt?.toDate
            ? data.updatedAt.toDate().toLocaleString('en-GB')
            : 'Unknown';

          const isOut = (data.status === 'out');

          const conditionMap = { good: { label: '✅ Good', cls: 'condition-good' }, attention: { label: '⚠️ Needs Attention', cls: 'condition-attention' }, damaged: { label: '🔴 Damaged', cls: 'condition-damaged' } };
          const cond = conditionMap[data.condition || 'good'] || conditionMap.good;

          document.getElementById('view-details').innerHTML = `
            <div class="detail-row">
              <span class="detail-label">Location</span>
              <span class="detail-value">${data.location || '—'}</span>
            </div>
            <div class="detail-row">
              <span class="detail-label">Description</span>
              <span class="detail-value">${data.description || '—'}</span>
            </div>            ${data.partNo ? `<div class="detail-row"><span class="detail-label">Part No.</span><span class="detail-value" style="font-family:monospace;font-size:0.93rem;">${data.partNo}</span></div>` : ''}            <div class="detail-row">
              <span class="detail-label">Condition</span>
              <span class="status-pill ${cond.cls}" style="margin-bottom:0;">${cond.label}</span>
            </div>
            <div class="updated-text">Last updated: ${updatedAt}</div>
          `;

          // Set up booking buttons and clear previous state
          document.getElementById('btn-bookout').style.display = isOut ? 'none' : 'block';
          document.getElementById('btn-return').style.display = isOut ? 'block' : 'none';
          document.getElementById('bookout-form').style.display = 'none';
          document.getElementById('booking-details-display').innerHTML = '';
          document.getElementById('booking-msg').textContent = '';
          currentBookingId = data.currentBookingId || null;
          if (isOut && currentBookingId) {
            loadActiveBooking(currentBookingId);
          }

          document.getElementById('view-mode').style.display = 'block';
          document.getElementById('edit-mode').style.display = 'none';

        } else {
          isNewAsset = true;
          document.getElementById('edit-badge').textContent = '🆕 New Asset';
          document.getElementById('edit-badge').className = 'badge badge-new';
          await loadLocations();
          populateLocationDropdown();
          document.getElementById('input-description').value = '';
          document.getElementById('view-mode').style.display = 'none';
          document.getElementById('edit-mode').style.display = 'block';
        }

      } catch (err) {
        statusEl.textContent = 'Error looking up asset. Please try again.';
        console.error(err);
      }
    };

    window.enableEdit = async function () {
      const locValue = currentAssetData?.location || '';
      const description = currentAssetData?.description || '';
      const condition = currentAssetData?.condition || 'good';
      await loadLocations();
      populateLocationDropdown(locValue);
      document.getElementById('input-description').value = description;
      document.getElementById('input-partno').value = currentAssetData?.partNo || '';
      document.getElementById('input-condition').value = condition;
      document.getElementById('edit-badge').textContent = '✏️ Editing';
      document.getElementById('edit-badge').className = 'badge badge-found';
      document.getElementById('view-mode').style.display = 'none';
      document.getElementById('edit-mode').style.display = 'block';
    };

    window.cancelEdit = function () {
      if (isNewAsset) {
        resetToLookup();
      } else {
        document.getElementById('view-mode').style.display = 'block';
        document.getElementById('edit-mode').style.display = 'none';
      }
    };

    window.saveAsset = async function () {
      const location = getLocationValue();
      const description = document.getElementById('input-description').value.trim();
      const condition = document.getElementById('input-condition').value || 'good';
      const partNo = document.getElementById('input-partno').value.trim();
      const statusEl = document.getElementById('status-msg');

      if (!location) {
        statusEl.textContent = 'Please select or enter a location.';
        statusEl.className = 'msg-error';
        return;
      }

      statusEl.innerHTML = '<span class="spinner"></span> Saving…';
      statusEl.className = '';

      try {
        await setDoc(doc(db, 'assets', currentId), {
          id: currentId,
          location,
          description,
          condition,
          partNo,
          updatedAt: serverTimestamp()
        }, { merge: true });

        statusEl.textContent = '✅ Saved successfully!';
        statusEl.className = 'msg-success';

        if (location && !knownLocations.includes(location)) {
          knownLocations = [...knownLocations, location].sort();
        }

        setTimeout(() => resetToLookup(), 1500);

      } catch (err) {
        statusEl.textContent = 'Error saving. Please try again.';
        statusEl.className = 'msg-error';
        console.error(err);
      }
    };

    window.resetToLookup = function () {
      currentId = null;
      isNewAsset = false;
      currentBookingId = null;
      currentAssetData = null;
      document.getElementById('asset-id-input').value = '';
      document.getElementById('lookup-status').textContent = '';
      document.getElementById('status-msg').textContent = '';
      document.getElementById('booking-msg').textContent = '';
      document.getElementById('lookup-section').style.display = 'block';
      document.getElementById('asset-section').style.display = 'none';
    };

    async function loadActiveBooking(bookingId) {
      try {
        const bSnap = await getDoc(doc(db, 'bookings', bookingId));
        if (!bSnap.exists()) return;
        const b = bSnap.data();
        const bookedAt = b.bookedAt?.toDate
          ? b.bookedAt.toDate().toLocaleString('en-GB')
          : '—';
        document.getElementById('booking-details-display').innerHTML = `
          <div class="booking-info">
            <div class="status-pill status-offsite">🚗 Currently Off-Site</div>
            <div class="detail-row">
              <span class="detail-label">Taken by</span>
              <span class="detail-value">${b.bookedBy || '—'}</span>
            </div>
            <div class="detail-row">
              <span class="detail-label">Destination</span>
              <span class="detail-value">${b.destination || '—'}</span>
            </div>
            ${b.notes ? `<div class="detail-row"><span class="detail-label">Notes</span><span class="detail-value">${b.notes}</span></div>` : ''}
            <div class="detail-row">
              <span class="detail-label">Booked out</span>
              <span class="detail-value">${bookedAt}</span>
            </div>
          </div>
        `;
      } catch (e) { console.error(e); }
    }

    window.showBookingForm = function () {
      document.getElementById('bookout-form').style.display = 'block';
      document.getElementById('input-bookedby').focus();
      document.getElementById('btn-bookout').style.display = 'none';
    };

    window.cancelBookingForm = function () {
      document.getElementById('bookout-form').style.display = 'none';
      document.getElementById('btn-bookout').style.display = 'block';
      document.getElementById('input-bookedby').value = '';
      document.getElementById('input-destination').value = '';
      document.getElementById('input-booknotes').value = '';
    };

    window.confirmBookOut = async function () {
      const bookedBy = document.getElementById('input-bookedby').value.trim();
      const destination = document.getElementById('input-destination').value.trim();
      const notes = document.getElementById('input-booknotes').value.trim();
      const msgEl = document.getElementById('booking-msg');

      const assetCondition = currentAssetData?.condition || 'good';
      if (assetCondition === 'damaged') {
        if (!confirm('🔴 This asset is marked as Damaged. Are you sure you want to book it out?')) return;
      } else if (assetCondition === 'attention') {
        if (!confirm('⚠️ This asset needs attention. Are you sure you want to book it out?')) return;
      }

      if (!bookedBy) {
        msgEl.textContent = 'Please enter who is taking this asset.';
        msgEl.style.color = '#e63946';
        return;
      }
      if (!destination) {
        msgEl.textContent = 'Please enter a destination or purpose.';
        msgEl.style.color = '#e63946';
        return;
      }

      msgEl.innerHTML = '<span class="spinner"></span> Booking out…';
      msgEl.style.color = '';

      try {
        const bookingRef = await addDoc(collection(db, 'bookings'), {
          assetId: currentId,
          bookedBy,
          destination,
          notes,
          bookedAt: serverTimestamp(),
          returnedAt: null
        });

        await updateDoc(doc(db, 'assets', currentId), {
          status: 'out',
          currentBookingId: bookingRef.id,
          updatedAt: serverTimestamp()
        });

        msgEl.textContent = '✅ Asset booked out!';
        msgEl.style.color = '#2d8a4e';

        setTimeout(() => {
          document.getElementById('bookout-form').style.display = 'none';
          document.getElementById('btn-return').style.display = 'block';
          document.getElementById('btn-bookout').style.display = 'none';
          currentBookingId = bookingRef.id;
          loadActiveBooking(bookingRef.id);
          document.getElementById('input-bookedby').value = '';
          document.getElementById('input-destination').value = '';
          document.getElementById('input-booknotes').value = '';
          msgEl.textContent = '';
        }, 1200);

      } catch (err) {
        msgEl.textContent = 'Error booking out. Please try again.';
        msgEl.style.color = '#e63946';
        console.error(err);
      }
    };

    window.returnAsset = async function () {
      if (!currentBookingId) return;
      const msgEl = document.getElementById('booking-msg');
      msgEl.innerHTML = '<span class="spinner"></span> Recording return…';
      msgEl.style.color = '';

      try {
        await updateDoc(doc(db, 'bookings', currentBookingId), {
          returnedAt: serverTimestamp()
        });

        await updateDoc(doc(db, 'assets', currentId), {
          status: 'in',
          currentBookingId: null,
          updatedAt: serverTimestamp()
        });

        document.getElementById('booking-details-display').innerHTML =
          '<div class="status-pill status-onsite" style="margin-bottom:16px;">📍 Back On-Site</div>';
        document.getElementById('btn-return').style.display = 'none';
        document.getElementById('btn-bookout').style.display = 'block';
        currentBookingId = null;
        msgEl.textContent = '✅ Asset returned successfully!';
        msgEl.style.color = '#2d8a4e';
        setTimeout(() => { msgEl.textContent = ''; }, 3000);

      } catch (err) {
        msgEl.textContent = 'Error recording return. Please try again.';
        msgEl.style.color = '#e63946';
        console.error(err);
      }
    };

    // Allow pressing Enter to search
    document.getElementById('asset-id-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') window.lookupAsset();
    });

    // Auto-lookup if ?id= param is present in URL (e.g. when linking from admin)
    const urlParams = new URLSearchParams(window.location.search);
    const urlId = urlParams.get('id');
    if (urlId) {
      document.getElementById('asset-id-input').value = urlId;
      setTimeout(() => window.lookupAsset(), 100);
    }
  </script>

</body>
</html>
