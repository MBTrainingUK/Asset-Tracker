<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Clear Booking History</title>
  <style>
    body { font-family: sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; background: #f0f2f5; margin: 0; }
    .box { background: white; border-radius: 16px; padding: 40px; max-width: 420px; width: 100%; box-shadow: 0 2px 12px rgba(0,0,0,0.1); text-align: center; }
    h2 { color: #1a1a2e; margin-bottom: 12px; }
    p { color: #666; margin-bottom: 24px; font-size: 0.95rem; }
    button { padding: 13px 28px; background: #e63946; color: white; border: none; border-radius: 10px; font-size: 1rem; font-weight: 600; cursor: pointer; }
    button:hover { opacity: 0.85; }
    #status { margin-top: 20px; font-size: 0.95rem; min-height: 24px; }
  </style>
</head>
<body>
  <div class="box">
    <h2>🗑️ Clear Booking History</h2>
    <p>This will permanently delete <strong>all booking records</strong> from Firestore. Asset statuses will also be reset to on-site.</p>
    <button onclick="runCleanup()">Delete All Bookings</button>
    <div id="status"></div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, collection, getDocs, deleteDoc, doc, updateDoc, serverTimestamp }
      from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyARn4prWj_fcSOwNMp_tp15M3BNZR5CmB8",
      authDomain: "asset-tracker-fd8de.firebaseapp.com",
      projectId: "asset-tracker-fd8de",
      storageBucket: "asset-tracker-fd8de.firebasestorage.app",
      messagingSenderId: "825828878834",
      appId: "1:825828878834:web:498d9e24f73b60a0de236b"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    window.runCleanup = async function () {
      const statusEl = document.getElementById('status');
      if (!confirm('Are you sure? This cannot be undone.')) return;

      statusEl.textContent = '⏳ Deleting bookings…';

      try {
        // Delete all booking documents
        const bookingsSnap = await getDocs(collection(db, 'bookings'));
        for (const d of bookingsSnap.docs) {
          await deleteDoc(doc(db, 'bookings', d.id));
        }

        // Reset any assets marked as out
        const assetsSnap = await getDocs(collection(db, 'assets'));
        for (const d of assetsSnap.docs) {
          if (d.data().status === 'out') {
            await updateDoc(doc(db, 'assets', d.id), {
              status: 'in',
              currentBookingId: null,
              updatedAt: serverTimestamp()
            });
          }
        }

        statusEl.style.color = '#2d8a4e';
        statusEl.textContent = `✅ Done! ${bookingsSnap.size} booking(s) deleted. You can close this page.`;
        document.querySelector('button').disabled = true;
      } catch (err) {
        statusEl.style.color = '#e63946';
        statusEl.textContent = 'Error: ' + err.message;
        console.error(err);
      }
    };
  </script>
</body>
</html>
